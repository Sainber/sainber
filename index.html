<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f1de" />
    <title>正品验证</title>
    <style>
      :root {
        --bg-top: #f8f3e5;
        --bg-bottom: #e6f3ea;
        --card: rgba(255, 255, 255, 0.82);
        --border: rgba(13, 87, 55, 0.12);
        --text: #163226;
        --muted: #5a7265;
        --accent: #1f8f5f;
        --accent-soft: #d8f2e4;
        --gold: #c7973a;
        --shadow: 0 20px 50px rgba(20, 56, 39, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 34%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(env(safe-area-inset-top) + 24px) 18px
          calc(env(safe-area-inset-bottom) + 24px);
      }

      .card {
        position: relative;
        width: 100%;
        max-width: 420px;
        padding: 26px 22px 24px;
        border-radius: 28px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        overflow: hidden;
      }

      .card::before,
      .card::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        pointer-events: none;
      }

      .card::before {
        width: 180px;
        height: 180px;
        background: rgba(31, 143, 95, 0.12);
        top: -70px;
        right: -90px;
      }

      .card::after {
        width: 120px;
        height: 120px;
        background: rgba(199, 151, 58, 0.12);
        bottom: -50px;
        left: -50px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(31, 143, 95, 0.12);
        color: var(--muted);
        font-size: 13px;
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(31, 143, 95, 0.1);
      }

      .hero {
        position: relative;
        z-index: 1;
        text-align: center;
        margin-top: 20px;
      }

      .seal {
        width: 112px;
        height: 112px;
        margin: 0 auto 18px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(31, 143, 95, 0.16), rgba(255, 255, 255, 0.92)),
          #fff;
        border: 1px solid rgba(31, 143, 95, 0.18);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 14px 30px rgba(31, 143, 95, 0.15);
      }

      .seal-ring {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--accent) 0%, #48b886 100%);
        box-shadow: 0 10px 24px rgba(31, 143, 95, 0.28);
      }

      .seal-ring svg {
        width: 38px;
        height: 38px;
        fill: #fff;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.08;
        letter-spacing: 2px;
      }

      .subtitle {
        margin: 10px 0 0;
        font-size: 15px;
        line-height: 1.7;
        color: var(--muted);
      }

      .highlight {
        margin-top: 18px;
        padding: 16px 14px;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(216, 242, 228, 0.92), rgba(255, 255, 255, 0.88));
        border: 1px solid rgba(31, 143, 95, 0.12);
      }

      .highlight-title {
        margin: 0;
        font-size: 15px;
        color: var(--muted);
      }

      .highlight-value {
        margin: 8px 0 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 3px;
      }

      .detail-list {
        position: relative;
        z-index: 1;
        margin: 18px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .detail-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(22, 50, 38, 0.08);
      }

      .detail-label {
        font-size: 13px;
        color: var(--muted);
      }

      .detail-value {
        text-align: right;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        word-break: break-word;
      }

      .note {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 18px;
        font-size: 12px;
        line-height: 1.7;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.54);
      }

      .brand {
        margin-top: 18px;
        text-align: center;
        font-size: 12px;
        color: rgba(22, 50, 38, 0.5);
        letter-spacing: 2px;
      }

      @media (max-width: 360px) {
        .card {
          padding: 22px 18px;
        }

        h1 {
          font-size: 30px;
        }

        .highlight-value {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="正品验证结果">
        <div class="badge">
          <span class="badge-dot" aria-hidden="true"></span>
          官方防伪验证
        </div>

        <div class="hero">
          <div class="seal" aria-hidden="true">
            <div class="seal-ring">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M9.55 18.2 4.6 13.25l1.4-1.4 3.55 3.55 8.45-8.45 1.4 1.4-9.85 9.85Z"
                />
              </svg>
            </div>
          </div>

          <h1 id="productName">圣佰尔官方正品</h1>
          <p class="subtitle">
            您当前扫描的商品已通过验证，请放心查看与使用。
          </p>

          <div class="highlight">
            <p class="highlight-title">验证结果</p>
            <p class="highlight-value">正品验证通过</p>
          </div>
        </div>

        <ul class="detail-list">
          <li class="detail-item"  style="display:none">
            <span class="detail-label">商品名称</span>
            <span class="detail-value" >官方正品商品</span>
          </li>
          <li class="detail-item" style="display:none">
            <span class="detail-label">验证编号</span>
            <span class="detail-value" id="verifyCode">AUTH-2026-0001</span>
          </li>
          <li class="detail-item">
            <span class="detail-label">验证时间</span>
            <span class="detail-value" id="verifyTime">载入中...</span>
          </li>
        </ul>

        <div class="note">
          请认准官方渠道购买。若页面显示异常或您对商品信息有疑问，请联系品牌客服进一步核验。
        </div>

        <div class="brand" id="brandName">OFFICIAL AUTH</div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const brandName = params.get("brand") || "OFFICIAL AUTH";
      const productName = params.get("product") || "圣佰尔官方正品";
      const verifyCode = params.get("code") || "AUTH-2026-0001";

      document.getElementById("brandName").textContent = brandName;
      document.getElementById("productName").textContent = productName;
      document.getElementById("verifyCode").textContent = verifyCode;

      const verifyTime = new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      }).format(new Date());

      document.getElementById("verifyTime").textContent = verifyTime;
    </script>
  </body>
</html>
